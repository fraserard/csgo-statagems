fragment matchData on Match {
  datePlayed
  id
  score
  map {
    mapName
  }
  teams {
    captainId
    outcome
    roundsWon
    startSide
    teamId
    matchPlayers {
      deaths
      kills
      playerId
      assists
      steamUsername
      avatar {
        smallAvatarUrl
      }
    }
  }
}

query GetMatch($matchId: Int!) {
  match(matchId: $matchId) {
    ...matchData
  }
}

query GetMatchList {
  matches {
    datePlayed
    id
    score
    map {
      mapName
    }
    teams {
      matchPlayers {
        playerId
        avatar {
          smallAvatarUrl
        }
      }
    }
  }
}
